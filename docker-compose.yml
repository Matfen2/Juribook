name: juribook

services:
  # ═══════════════════════════════════════════════════════════
  #  PostgreSQL - 1 instance, 1 base par micro-service
  #  (pattern "database per service")
  # ═══════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: juribook-postgres
    environment:
      POSTGRES_USER: juribook
      POSTGRES_PASSWORD: juribook
      POSTGRES_DB: juribook
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro # Initialisation de la base de données
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juribook"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════
  #  Kafka (KRaft mode - sans Zookeeper)
  # ═══════════════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: juribook-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════════════
  #  Kafka UI - interface web pour inspecter topics & messages
  # ═══════════════════════════════════════════════════════════
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - kafka-network

  # ═══════════════════════════════════════════════════════════
  #  MICRO-SERVICES SPRING BOOT  
  # Microservices Spring Boot (auth, lawyer, booking, notification, audit) :
  # - Chaque service a sa propre base PostgreSQL (créée par init.sql)
  auth-service:
      build: ../backend/auth-service
      container_name: juribook-auth-service
      depends_on:
        postgres:
          condition: service_healthy
        kafka:
          condition: service_healthy
      ports:
        - "8081:8081"
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authdb
        SPRING_DATASOURCE_USERNAME: juribook
        SPRING_DATASOURCE_PASSWORD: juribook
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  lawyer-service:
      build: ../backend/lawyer-service
      container_name: juribook-lawyer-service
      depends_on:
        postgres:
          condition: service_healthy
        kafka:
          condition: service_healthy
      ports:
        - "8082:8082"
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lawyerdb
        SPRING_DATASOURCE_USERNAME: juribook
        SPRING_DATASOURCE_PASSWORD: juribook
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  booking-service:
      build: ../backend/booking-service
      container_name: juribook-booking-service
      depends_on:
        postgres:
          condition: service_healthy
        kafka:
          condition: service_healthy
      ports:
        - "8083:8083"
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookingdb
        SPRING_DATASOURCE_USERNAME: juribook
        SPRING_DATASOURCE_PASSWORD: juribook
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  notification-service:
      build: ../backend/notification-service
      container_name: juribook-notification-service
      depends_on:
        postgres:
          condition: service_healthy
        kafka:
          condition: service_healthy
      ports:
        - "8084:8084"
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notificationdb
        SPRING_DATASOURCE_USERNAME: juribook
        SPRING_DATASOURCE_PASSWORD: juribook
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  
  audit-service:
      build: ../backend/audit-service
      container_name: juribook-audit-service
      depends_on:
        postgres:
          condition: service_healthy
        kafka:
          condition: service_healthy
      ports:
        - "8085:8085"
      environment:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auditdb
        SPRING_DATASOURCE_USERNAME: juribook
        SPRING_DATASOURCE_PASSWORD: juribook
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  
volumes:
  postgres-data:
  kafka-data:

networks:
  kafka-network:
    driver: bridge