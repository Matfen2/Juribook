server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: auth-service

  security:
    user:
      name: disabled
      password: disabled

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USER:juribook}
    password: ${DB_PASSWORD:juribook}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Sprint 0 : pas encore de migrations. Activer au Sprint 5 (table append-only audit_log).
  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: auth-service
      auto-offset-reset: earliest
    producer:
      acks: all

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.juribook: DEBUG

juribook:
  jwt:
    # Clé HMAC-SHA256 — minimum 32 caractères (256 bits)
    # En production, à externaliser via une variable d'environnement
    secret: ${JWT_SECRET:dev-only-secret-key-replace-in-prod-2026-juribook-sprint1}
    # Durée de validité du token en millisecondes (1h = 3600000)
    expiration-ms: ${JWT_EXPIRATION:3600000}
    # Nom du cookie HttpOnly côté client
    cookie-name: ${JWT_COOKIE:juribook_access_token}