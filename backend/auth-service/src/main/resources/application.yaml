server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: auth-service

  security:
    user:
      name: disabled
      password: disabled

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USER:juribook}
    password: ${DB_PASSWORD:juribook}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: auth-service
      auto-offset-reset: earliest
    producer:
      acks: all
      properties:
        # Sérialiseur clé : StringSerializer pour les UUID stringifiés
        key.serializer: org.apache.kafka.common.serialization.StringSerializer
        # Sérialiseur valeur : Apicurio Avro (préfixe magic byte + globalId)
        value.serializer: io.apicurio.registry.serde.avro.AvroKafkaSerializer
        # URL Apicurio v3 — différente de v2 (/api/v2)
        apicurio.registry.url: ${APICURIO_URL:http://localhost:8888/apis/registry/v3}
        # Enregistre automatiquement le schéma à la première publication (dev only)
        apicurio.registry.auto-register: "true"
        # Récupère le schéma le plus récent avant chaque publication
        apicurio.registry.find-latest: "true"
        # Convention de nommage : artifactId = nom du topic
        apicurio.registry.artifact-resolver-strategy: io.apicurio.registry.serde.strategy.TopicIdStrategy

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    juribook.auth_service: DEBUG

juribook:
  jwt:
    # Clé HMAC-SHA256 — minimum 32 caractères (256 bits)
    # En production, à externaliser via une variable d'environnement
    secret: ${JWT_SECRET:dev-only-secret-key-replace-in-prod-2026-juribook-sprint1}
    # Durée de validité du token en millisecondes (1h = 3600000)
    expiration-ms: ${JWT_EXPIRATION:3600000}
    # Nom du cookie HttpOnly côté client
    cookie-name: ${JWT_COOKIE:juribook_access_token}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}    # 7 jours
    refresh-cookie-name: ${JWT_REFRESH_COOKIE:juribook_refresh_token}

  # Configuration du poller outbox (Sprint 2.2.B-bis)
  outbox:
    poll-interval-ms: 2000
    batch-size: 100
    max-retries: 15