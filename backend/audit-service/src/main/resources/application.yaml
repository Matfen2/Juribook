spring:
  application:
    # Nom logique du micro-service (utilisé dans les logs, Actuator, Kafka client-id, etc.)
    name: audit-service

  # ═══════════════════════════════════════════════════════════
  #  Connexion à la base PostgreSQL dédiée à ce micro-service
  #  (pattern "database per service" : chaque service a sa propre DB)
  # ═══════════════════════════════════════════════════════════
  datasource:
    # localhost car ce service tourne hors Docker (depuis l'IDE/Maven).
    # En conteneur Docker, cette valeur est surchargée par SPRING_DATASOURCE_URL
    # (cf. docker-compose.yml -> jdbc:postgresql://postgres:5432/auditdb)
    url: jdbc:postgresql://localhost:5432/auditdb
    username: juribook
    password: juribook
    driver-class-name: org.postgresql.Driver

  # ═══════════════════════════════════════════════════════════
  #  JPA / Hibernate
  # ═══════════════════════════════════════════════════════════
  jpa:
    hibernate:
      # "validate" : Hibernate vérifie que les entités correspondent au schéma
      # existant, mais ne crée/modifie JAMAIS les tables (c'est Flyway qui s'en charge).
      ddl-auto: validate
    # Passe à "true" temporairement pour déboguer les requêtes SQL générées par Hibernate
    show-sql: false

  # ═══════════════════════════════════════════════════════════
  #  Flyway - gestion des migrations de schéma SQL (ajout des fichiers .sql plus tard)
  # ═══════════════════════════════════════════════════════════
  flyway:
    enabled: true

  # ═══════════════════════════════════════════════════════════
  #  Kafka - gestion d'événements (consommé/produit par ce micro-service)
  # ═══════════════════════════════════════════════════════════
  kafka:
    # En conteneur, surchargé par SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    bootstrap-servers: localhost:9092

# ═══════════════════════════════════════════════════════════
#  Configuration du serveur web
# ═══════════════════════════════════════════════════════════
server:
  # Port d'écoute HTTP de l'audit-service (cohérent avec docker-compose.yml)
  port: 8085