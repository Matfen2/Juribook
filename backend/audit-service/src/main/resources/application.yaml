server:
  port: 8085
  shutdown: graceful

spring:
  application:
    name: audit-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5436}/${DB_NAME:audit_db}
    username: ${DB_USER:juribook}
    password: ${DB_PASSWORD:juribook}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Sprint 0 : pas encore de migrations. Activer au Sprint 5 (table append-only audit_log).
  flyway:
    enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: audit-service
      auto-offset-reset: earliest
    producer:
      acks: all

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.juribook: DEBUG